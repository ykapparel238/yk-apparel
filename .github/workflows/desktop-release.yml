name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example desktop-v1.0.0"
        required: true
        type: string
      release_name:
        description: "Release title shown on GitHub Releases"
        required: true
        type: string
      draft:
        description: "Create the release as a draft"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm test
      - run: npm run build:desktop -- --mac dmg
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: dist/**/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm test
      - run: npm run build:desktop -- --win nsis
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: dist/**/*.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: ${{ inputs.draft }}
          files: |
            artifacts/desktop-macos/**
            artifacts/desktop-windows/**
